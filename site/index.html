<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Apogee</title>
  <meta name="description" content="A from-scratch, Linux-first launcher for FINAL FANTASY XIV.">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 2rem;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #16202e 0%, #0d1117 60%);
      color: #e6edf3;
    }
    main { max-width: 40rem; text-align: center; }
    h1 { font-size: clamp(2.75rem, 9vw, 4.5rem); margin: 0 0 0.75rem; letter-spacing: -0.03em; }
    .status {
      display: inline-block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: #7ee787; border: 1px solid rgba(46, 160, 67, 0.4); border-radius: 999px;
      padding: 0.3rem 0.9rem; margin-bottom: 1.75rem;
    }
    .tag { font-size: 1.15rem; color: #9da7b3; margin: 0 0 2.25rem; line-height: 1.6; }
    .links { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    a.btn {
      text-decoration: none; color: #e6edf3; border: 1px solid #30363d; border-radius: 8px;
      padding: 0.6rem 1.2rem; font-weight: 600; transition: border-color 0.15s ease, background 0.15s ease;
    }
    a.btn:hover { border-color: #8b949e; background: #161b22; }
    a.btn.primary { background: #238636; border-color: #238636; }
    a.btn.primary:hover { background: #2ea043; border-color: #2ea043; }
    footer { margin-top: 2.75rem; font-size: 0.8rem; color: #6e7681; line-height: 1.6; }
  </style>
</head>
<body>
  <main>
    <h1>Apogee</h1>
    <div class="status">Early development</div>
    <p class="tag">
      A from-scratch, Linux-first launcher for FINAL FANTASY XIV. Standalone Rust crates, a headless
      CLI, and a thin desktop shell.
    </p>
    <div class="links">
      <a class="btn primary" href="https://github.com/soleynn/apogee">GitHub</a>
      <a class="btn" href="https://github.com/soleynn/apogee/blob/main/LICENSE">License (GPL-3.0)</a>
    </div>
    <footer>
      Independent, clean-room project. Not affiliated with or endorsed by Square Enix.
    </footer>
  </main>
</body>
</html>
