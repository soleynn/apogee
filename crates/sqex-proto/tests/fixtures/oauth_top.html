<script>

 		var targets = new Array(2);

   }

</script>

<div class="l-login-form mode-light" onKeyPress="return onEnterPressSubmit(event);">
	<form action="login.send" method="post" name="mainForm">
		<input type="hidden" name="token" id="token">

		
		<input type="hidden" name="_STORED_" value="00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff">

		
		<div class="form-item type-id">
			<label class="item-label" for="sqexid"><span class="label-image-text" title="Square Enix ID"></span></label>
			<input class="item-input" name="sqexid" id="sqexid" type="text" value="" tabindex="1" placeholder="ID (Required)"  maxLength="16"
			
				 />
			
		</div>

		 <div class="form-item type-pw">
			<label class="item-label" for="password"><span class="label-image-text" title="Square Enix Password"></span></label>
			<input class="item-password" name="password" id="password" type="password" value="" tabindex="2" placeholder="Password (Required)" maxLength="32" autocomplete="off"/>
		</div>
	
		<div class="form-item type-otpw">
			<label class="item-label" for="otppw"><span class="label-image-text" title="One-Time Password"></span></label>
			<input class="item-otpw" name="otppw" id="otppw" type="text" value="" tabindex="3" autocomplete="off" maxLength="6" placeholder="Password (Optional)" />
		</div>

		
		<div class="form-item type-remember-id">
			<input name="saveid" id="saveid" type="checkbox" value="1" class="item-checkbox" tabindex="4"  />
			<label class="item-checkbox-label" for="saveid"><span class="label-checkbox-image-text" title="Remember Square Enix ID"></span></label>
		</div>
		

		<div class="form-item type-submit">
			
				<button class="item-button" type="submit" tabindex="5" onClick="ctrEvent('mainForm')" id="btLogin"><span class="button-image-text" title="Login"></span></button>
			
		</div>

	</form>
</div>
