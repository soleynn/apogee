# cargo-deny policy. Authored at scaffold; validate when cargo-deny is installed or CI runs.

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"

[bans]
# Home-built domain code only: no third-party FFXIV crates in the graph.
deny = [
    { name = "physis" },
    { name = "ironworks" },
    # rustls is the only TLS stack; keep OpenSSL out.
    { name = "openssl-sys" },
]

[licenses]
version = 2
# Our own license (GPL-3.0-or-later) plus GPL-compatible permissive licenses for dependencies.
allow = [
    "GPL-3.0-or-later",
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
]
# webpki-roots ships the Mozilla CA bundle (via rustls) under a data license; scope the
# allowance to that crate so any other CDLA-licensed crate still trips the gate.
exceptions = [
    { name = "webpki-roots", allow = ["CDLA-Permissive-2.0"] },
]
private = { ignore = true }

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
