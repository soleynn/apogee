name: Changelog

# Regenerate CHANGELOG.md from the commit history on each pull request and commit it back to the PR's
# own branch, so the changelog lands together with the change. main is ruleset-protected (changes via
# PR only), so the update rides the PR rather than being pushed to main directly.
#
# The push uses a fine-grained PAT stored as the CHANGELOG_TOKEN secret, not the default GITHUB_TOKEN:
# a GITHUB_TOKEN push does not trigger CI on the new commit, which would leave the PR head without the
# required status checks and block the merge. When the secret is absent the job skips with a warning.
on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: changelog-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  changelog:
    name: changelog
    runs-on: ubuntu-latest
    # Same-repo PRs only: fork PRs receive no secret (and are auto-closed anyway).
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: false
      - name: Regenerate the changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: --output CHANGELOG.md
      - name: Commit to the PR branch if it changed
        env:
          PUSH_TOKEN: ${{ secrets.CHANGELOG_TOKEN }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [ -z "${PUSH_TOKEN}" ]; then
            echo "::warning::CHANGELOG_TOKEN secret is not set; skipping changelog auto-commit"
            exit 0
          fi
          # Loop guard: if the PR head is already an auto-commit, there is nothing to add. Belt to the
          # cliff.toml skip rule, which alone makes regeneration idempotent.
          if [ "$(git log -1 --pretty=%s)" = "chore: regenerate changelog" ]; then
            echo "PR head is already a changelog regeneration; nothing to do"
            exit 0
          fi
          if git diff --quiet -- CHANGELOG.md; then
            echo "changelog already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: regenerate changelog"
          git push "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${HEAD_REF}"
