name: Changelog

# After each merge to main AND each release tag, regenerate CHANGELOG.md and push it back to main. main
# is ruleset-protected (changes via PR only), so the push uses a GitHub App token whose app is on the
# ruleset bypass list, not the default GITHUB_TOKEN. The tag trigger is what versions a release section:
# a tag is created after the release commit's own push, so without it the just-tagged version would sit
# under [Unreleased] until the next unrelated merge.
#
# Loop prevention: the bot commit carries [skip ci] (GitHub skips its push) and the job's own
# "already current" diff-check no-ops when nothing changed; cliff.toml also skips "chore: regenerate
# changelog" so a stray run stays idempotent. (paths-ignore is intentionally not used: it does not
# apply cleanly to tag pushes, and the guards above already prevent looping.) Until the
# APP_ID / APP_PRIVATE_KEY secrets exist the job skips with a warning.
on:
  push:
    branches: [main]
    tags:
      - "v[0-9]*"

permissions:
  contents: read

concurrency:
  group: changelog-main
  cancel-in-progress: false

jobs:
  changelog:
    name: changelog
    runs-on: ubuntu-latest
    steps:
      - name: Mint a GitHub App token
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          # Scope the minted token to only what the push needs, not all the app's permissions.
          permission-contents: write
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Regenerate the changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: --output CHANGELOG.md
      - name: Commit to main if it changed
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ -z "${APP_TOKEN}" ]; then
            echo "::warning::App token unavailable (set APP_ID and APP_PRIVATE_KEY); skipping changelog auto-commit"
            exit 0
          fi
          if git diff --quiet -- CHANGELOG.md; then
            echo "changelog already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: regenerate changelog [skip ci]"
          git push "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
