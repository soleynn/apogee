name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref instead of letting them pile up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: "10"
  RUSTUP_MAX_RETRIES: "10"

permissions:
  contents: read

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master # zizmor: ignore[ref-version-mismatch]
        with:
          toolchain: "1.97.0"
          components: rustfmt
      - run: cargo fmt --all --check
      # The dev tools are separate workspaces, so --all skips them; format-check them too.
      - run: cargo fmt --manifest-path tools/sqex-proto-probe/Cargo.toml --all --check
      - run: cargo fmt --manifest-path tools/boot-check/Cargo.toml --all --check
      - run: cargo fmt --manifest-path tools/catalog-sign/Cargo.toml --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master # zizmor: ignore[ref-version-mismatch]
        with:
          toolchain: "1.97.0"
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo clippy --all-targets --all-features -- -D warnings
      # Lint the dev tools too (separate workspaces the run above misses), so the probe cannot rot on
      # a sqex-proto API change without CI noticing.
      - run: cargo clippy --manifest-path tools/sqex-proto-probe/Cargo.toml --all-targets -- -D warnings
      - run: cargo clippy --manifest-path tools/boot-check/Cargo.toml --all-targets -- -D warnings
      - run: cargo clippy --manifest-path tools/catalog-sign/Cargo.toml --all-targets -- -D warnings

  test-linux:
    name: test-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master # zizmor: ignore[ref-version-mismatch]
        with:
          toolchain: "1.97.0"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20 # v2.83.3
        with:
          tool: nextest
      - run: cargo nextest run --profile ci --workspace --no-tests=pass
      - run: cargo test --workspace --doc
      # The unverified-download-over-TLS test needs a client that trusts a loopback test certificate,
      # exposed only behind apogee-fetch's test-only `testing` feature, so it runs as its own step.
      - run: cargo test -p apogee-fetch --features testing --test none_over_tls
      # The corpus fetcher lives behind the `corpus` feature (off by default so it stays out of the
      # plain and cross builds); its self-test is hermetic (chaos-server-backed, no network).
      - run: cargo test -p apogee-test-support --features corpus corpus

  # Process supervision on stock wine: launches a stub PE and proves the /proc scanner resolves it,
  # kills it targeted, and that wineserver -k is the separate broad stop. A required gate: the
  # scanner logic is also covered hermetically in test-linux without wine, but only a real wine run
  # exercises the /proc resolution and the CLI leak detector end to end. Both steps run
  # single-threaded with WINEDEBUG=-all to keep headless wine deterministic; if real-wine startup
  # ever proves flaky, wrap the wine steps in a bounded retry rather than making the job advisory.
  test-linux-wine:
    name: test-linux-wine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master # zizmor: ignore[ref-version-mismatch]
        with:
          toolchain: "1.97.0"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: wine
          save-if: ${{ github.ref == 'refs/heads/main' }}
      # Host wine runs the game; the MinGW cross-compiler builds the stub PE the test launches.
      - name: Install wine and the MinGW cross toolchain
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y wine64 wine gcc-mingw-w64-x86-64
      - name: Supervision under stock wine
        env:
          WINEDEBUG: "-all"
        run: cargo test -p apogee-runtime --features wine-integration --test supervise_wine -- --test-threads=1
      # End-to-end: the CLI logs in against scripted fixtures and launches a stub game through system
      # wine, resolving the real process and killing it. This is the login → register → launch proof
      # and the output leak detector.
      - name: CLI login and launch under stock wine
        env:
          WINEDEBUG: "-all"
        run: cargo test -p apogee-cli --features wine-integration --test e2e -- --test-threads=1

  build-windows-cross:
    name: build-windows-cross
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master # zizmor: ignore[ref-version-mismatch]
        with:
          toolchain: "1.97.0"
          targets: x86_64-pc-windows-gnu
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: windows-cross
          save-if: ${{ github.ref == 'refs/heads/main' }}
      # The GNU/MinGW ABI cross-compiles from a plain apt package: no MSVC SDK download, no llvm-lib,
      # no EULA. The Windows components run under Wine, where GNU-ABI binaries are fine.
      - name: Install the MinGW-w64 cross toolchain
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64
      - run: cargo build --target x86_64-pc-windows-gnu --workspace

  deny:
    name: deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1

  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master # zizmor: ignore[ref-version-mismatch]
        with:
          toolchain: "1.97.0"
      - run: bash scripts/audit.sh

  fuzz-smoke:
    name: fuzz-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master # zizmor: ignore[ref-version-mismatch]
        with:
          toolchain: nightly
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: fuzz
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20 # v2.83.3
        with:
          tool: cargo-fuzz
      # Build, then a short timed run: every parser fed hostile SE input must stay panic- and
      # allocation-safe on any input. Pin the gnu target: cargo-fuzz's default picks musl here, whose
      # static libc is incompatible with the address sanitizer.
      - run: cargo +nightly fuzz build patchlist --target x86_64-unknown-linux-gnu
      - run: cargo +nightly fuzz run patchlist --target x86_64-unknown-linux-gnu -- -max_total_time=30 -rss_limit_mb=2048
      - run: cargo +nightly fuzz build oauth_stored --target x86_64-unknown-linux-gnu
      - run: cargo +nightly fuzz run oauth_stored --target x86_64-unknown-linux-gnu -- -max_total_time=30 -rss_limit_mb=2048
      - run: cargo +nightly fuzz build oauth_launch_params --target x86_64-unknown-linux-gnu
      - run: cargo +nightly fuzz run oauth_launch_params --target x86_64-unknown-linux-gnu -- -max_total_time=30 -rss_limit_mb=2048
      - run: cargo +nightly fuzz build sqex_base64 --target x86_64-unknown-linux-gnu
      - run: cargo +nightly fuzz run sqex_base64 --target x86_64-unknown-linux-gnu -- -max_total_time=30 -rss_limit_mb=2048
      - run: cargo +nightly fuzz build runner_manifest --target x86_64-unknown-linux-gnu
      - run: cargo +nightly fuzz run runner_manifest --target x86_64-unknown-linux-gnu -- -max_total_time=30 -rss_limit_mb=2048
      - run: cargo +nightly fuzz build sqpack_codec --target x86_64-unknown-linux-gnu
      - run: cargo +nightly fuzz run sqpack_codec --target x86_64-unknown-linux-gnu -- -max_total_time=30 -rss_limit_mb=2048
      - run: cargo +nightly fuzz build zipatch_chunk --target x86_64-unknown-linux-gnu
      - run: cargo +nightly fuzz run zipatch_chunk --target x86_64-unknown-linux-gnu -- -max_total_time=30 -rss_limit_mb=2048
      - run: cargo +nightly fuzz build zipatch_sqpk --target x86_64-unknown-linux-gnu
      - run: cargo +nightly fuzz run zipatch_sqpk --target x86_64-unknown-linux-gnu -- -max_total_time=30 -rss_limit_mb=2048

  # The one live call: an unauthenticated GET to SE's boot endpoint, confirming the patchlist parser
  # handles genuinely-current output. An amber canary (continue-on-error) with one retry, so an SE CDN
  # hiccup is a visible warning, not a red build; the parser is also covered hermetically by fixtures.
  boot-check-live:
    name: boot-check-live
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master # zizmor: ignore[ref-version-mismatch]
        with:
          toolchain: "1.97.0"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: tools/boot-check
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Live boot-version check (retried once)
        run: >
          cargo run --manifest-path tools/boot-check/Cargo.toml ||
          { sleep 5; cargo run --manifest-path tools/boot-check/Cargo.toml; }
