name: Close external PRs

# Runs from the base branch (pull_request_target), so an external PR cannot alter it.
# It only reads PR metadata and never checks out untrusted code.
on:
  pull_request_target: # zizmor: ignore[dangerous-triggers] no PR checkout, minimal perms, static body
    types: [opened, reopened]

permissions:
  contents: read

jobs:
  close:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    # Skip the owner, collaborators, org members, and Dependabot; act only on outside PRs.
    if: >-
      github.event.pull_request.author_association != 'OWNER' &&
      github.event.pull_request.author_association != 'COLLABORATOR' &&
      github.event.pull_request.author_association != 'MEMBER' &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const pr = context.payload.pull_request;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: [
                "Thanks for the interest! Apogee is open source, but contribution is invitation-only, so unsolicited pull requests are closed automatically. This is not about your change.",
                "",
                "I keep a clear direction for the project and a small, deliberate group of collaborators. If you would like to get involved, reach out on Discord ([@soleynn.x](https://discord.com/users/1444305499456671829)) and tell me what you would like to work on. CONTRIBUTING.md has the details.",
                "",
                "Bug reports and ideas are always welcome as issues, no invitation needed.",
              ].join("\n"),
            });
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              state: "closed",
            });
