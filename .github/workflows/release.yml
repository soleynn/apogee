name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Classify the tag
        id: tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$REF_NAME" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "cliff_args=--unreleased --strip all" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "cliff_args=--latest --strip all" >> "$GITHUB_OUTPUT"
          fi
      - name: Generate release notes
        id: git-cliff
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: ${{ steps.tag.outputs.cliff_args }}
      # Stable tags ship a binary; pre-release checkpoints do not (§3.3). Build, strip, and package the
      # CLI so the release carries a self-contained tarball plus a sha256 sidecar. Linux only for now.
      - name: Set up Rust
        if: steps.tag.outputs.prerelease == 'false'
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master # zizmor: ignore[ref-version-mismatch]
        with:
          toolchain: "1.97.0"
      - name: Build and package the CLI
        id: package
        if: steps.tag.outputs.prerelease == 'false'
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          triple=x86_64-unknown-linux-gnu
          cargo build --release -p apogee-cli
          strip target/release/apogee-cli
          pkg="apogee-cli-${REF_NAME}-${triple}"
          install -Dm755 target/release/apogee-cli "dist/${pkg}/apogee-cli"
          tar -C dist -czf "${pkg}.tar.gz" "${pkg}"
          sha256sum "${pkg}.tar.gz" > "${pkg}.tar.gz.sha256"
          echo "tarball=${pkg}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=${pkg}.tar.gz.sha256" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          NOTES: ${{ steps.git-cliff.outputs.content }}
          PRERELEASE: ${{ steps.tag.outputs.prerelease }}
          TARBALL: ${{ steps.package.outputs.tarball }}
          CHECKSUM: ${{ steps.package.outputs.checksum }}
        run: |
          if [ "$PRERELEASE" = "true" ]; then
            gh release create "$GITHUB_REF_NAME" --notes "$NOTES" --prerelease
          else
            gh release create "$GITHUB_REF_NAME" --notes "$NOTES" --latest "$TARBALL" "$CHECKSUM"
          fi
