# git-cliff configuration: https://git-cliff.org
# CHANGELOG.md is generated from the commit history, so it is not edited by hand; the changelog
# workflow (.github/workflows/changelog.yml) regenerates it on each merge to main.

[changelog]
header = """
# Changelog

All notable changes to this project are documented here. Entries are grouped by crate, and each line
is tagged with its change type. Versioning aims to follow
[Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""
# Crate-first: one section per commit scope (the crate), change type as an italic tag per line.
# Unscoped commits (workspace-wide CI, docs, chores) collect under a trailing "workspace" section.
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for scope, scoped in commits | filter(attribute="scope") | group_by(attribute="scope") %}
### {{ scope }}
{% for commit in scoped %}\
- {{ commit.message | split(pat="\n") | first | trim | upper_first }} _({{ commit.group | lower }})_
{% endfor %}\
{% endfor %}\
{% if commits | filter(attribute="scope") | length < commits | length %}
### workspace
{% for commit in commits %}{% if not commit.scope %}\
- {{ commit.message | split(pat="\n") | first | trim | upper_first }} _({{ commit.group | lower }})_
{% endif %}{% endfor %}\
{% endif %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
# Normalize short crate scopes to their full crate names so each crate is one section.
commit_preprocessors = [
  { pattern = '^(\w+)\(addons\)', replace = '${1}(apogee-addons)' },
  { pattern = '^(\w+)\(fetch\)', replace = '${1}(apogee-fetch)' },
  { pattern = '^(\w+)\(otp\)', replace = '${1}(apogee-otp)' },
  { pattern = '^(\w+)\(patcher\)', replace = '${1}(apogee-patcher)' },
  { pattern = '^(\w+)\(runtime\)', replace = '${1}(apogee-runtime)' },
  { pattern = '^(\w+)\(secrets\)', replace = '${1}(apogee-secrets)' },
  { pattern = '^(\w+)\(sqpack\)', replace = '${1}(apogee-sqpack)' },
  { pattern = '^(\w+)\(zipatch\)', replace = '${1}(apogee-zipatch)' },
  { pattern = '^(\w+)\(test-support\)', replace = '${1}(apogee-test-support)' },
]
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Changed" },
  { message = "^doc", group = "Documentation" },
  { message = "^test", group = "Testing" },
  { message = "^ci", group = "CI" },
  { message = "^build", group = "Build" },
  { message = "^style", group = "Styling" },
  { message = "^revert", group = "Reverted" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore\\(deps\\)", skip = true },
  # The changelog workflow's own auto-commit: exclude it so regeneration is idempotent (no perpetual
  # one-behind diff) and the changelog carries no "regenerate changelog" noise.
  { message = "^chore: regenerate changelog", skip = true },
  { message = "^chore", group = "Miscellaneous" },
  { body = ".*[Ss]ecurity", group = "Security" },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "oldest"
